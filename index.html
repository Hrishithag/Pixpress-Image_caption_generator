<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixpress</title>
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body>
  <div class="logo-intro">
    <img src="assets/logo.png" alt="Pixpress Logo" />
  </div>

  <div class="container">
    <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">Dark Mode</button>
    <h1>Welcome to <span class="highlight">Pixpress</span> &#10024;</h1>

    <div class="card">
      <label for="imageUpload" class="styled-upload-btn">&#128247; Upload an image</label>
      <input type="file" id="imageUpload" accept="image/*" class="hidden-file" />
      <p class="drop-hint">or drag and drop an image here</p>

      <img id="previewImage" class="image-preview" alt="Uploaded preview" />
      <p id="captionOutput" class="caption-text">Your caption will appear here...</p>
      <div id="loadingState" class="loading-state" aria-hidden="true">
        <span class="spinner"></span>
        <span>Generating caption...</span>
      </div>
      <p id="feedbackMessage" class="feedback-message" role="status"></p>

      <button id="playBtn" type="button">&#127911; Play Caption</button>
      <div class="caption-actions">
        <button id="copyBtn" type="button" disabled>Copy Caption</button>
        <button id="downloadBtn" type="button" disabled>Download Caption</button>
      </div>

      <section class="history-section" aria-labelledby="historyTitle">
        <h2 id="historyTitle">Caption History</h2>
        <p id="emptyHistory" class="history-empty">No captions yet.</p>
        <ul id="captionHistory" class="caption-history"></ul>
      </section>
    </div>
  </div>
</body>
</html>
